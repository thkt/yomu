version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: chore
      include: scope
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
